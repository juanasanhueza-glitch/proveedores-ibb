var TCLMAP={API:'b-api',MP:'b-mp',MEE:'b-mee','SERV.':'b-srv'};
var PROVS=[],PD=[],PA=[];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function apill(a){
  if(a==='Vigente')return 'pvig';
  if(a.indexOf('Vencido')===0)return 'pvenc';
  if(a.indexOf('Por vencer')===0)return 'ppv';
  if(a.indexOf('Proximo')===0||a.indexOf('Pr\u00f3ximo')===0)return 'pprox';
  return 'ppend';
}
function pctColor(v){if(!v)return '#c5d0dd';var n=parseFloat(v);if(n>=90)return '#1A9A50';if(n>=70)return '#F5A623';return '#E24B4A';}
function getDriveId(np,nc){return (DRIVE_IDS&&(DRIVE_IDS[np+'|'+nc]||DRIVE_IDS[np+'|'+np]))||'';}

function init(){
  PROVS=RAW.map(function(p){
    p.drive_id=DRIVE_IDS[p.n_prov+'|'+p.proveedor]||DRIVE_IDS[p.n_prov+'|'+p.n_cert]||'';
    p._idx=[p.n_prov,p.proveedor,p.n_cert,p.cod_reporte,p.razon_social||'',p.rubro||'',p.contacto||'',p.correo||'']
      .concat(p.produtos||p.productos||[])
      .concat((p.materiales||[]).map(function(m){return (m.codigo_mat||'')+' '+(m.descripcion||'')+' '+(m.fabricante||'');}))
      .join(' ').toLowerCase();
    return p;
  });
  PD=PRODS_DET.map(function(p){
    p._idx=[p.nombre,p.cliente||'',p.rep_val||'']
      .concat((p.insumos||[]).map(function(i){return (i.codigo||'')+' '+(i.desc||'')+' '+(i.proveedor||'');}))
      .join(' ').toLowerCase();
    return p;
  });
  PA=PRODS_ALL.slice();
  var sp=document.getElementById('fProd');
  PA.forEach(function(pr){var o=document.createElement('option');o.value=o.textContent=pr;sp.appendChild(o);});
  var clis=[];
  PROVS.forEach(function(p){(p.clientes||[]).forEach(function(c){if(c&&clis.indexOf(c)===-1)clis.push(c);});});
  clis.sort();
  var sc=document.getElementById('fCli');
  clis.forEach(function(c){var o=document.createElement('option');o.value=o.textContent=c;sc.appendChild(o);});
  render();
}

  return '<div class="tcard" data-idx="'+idx+'" data-mode="tarjeta" onclick="openTP('+idx+')">'
    +'<div class="tcard-head">'
      +'<div class="logo-row">'
        +'<div class="inst">INSTITUTO BIOQUÍMICO<br>BETA S.A.</div>'
        +'<div class="title">TARJETA DE PROVEEDOR</div>'
        +'<span class="badge '+tcl+'" style="align-self:flex-start">'+esc(p.tipo)+'</span>'
      +'</div>'
      +'<div style="font-size:16px;font-weight:700;margin-top:4px">'+esc(p.razon_social||p.proveedor)+pdfTag+'</div>'
      +'<div style="font-size:11px;opacity:.8;margin-top:3px">'+esc(p.n_prov)+' · Imp. '+(p.importancia||'—')+'</div>'
    +'</div>'
    +'<div class="tcard-body">'
      +'<div class="trow"><div class="tlbl">Rubro</div><div class="tval" style="font-size:11px">'+esc(p.rubro||'S/C')+'</div></div>'
    +(p.fabricantes_grupo&&p.fabricantes_grupo.length>1
      ?'<div class="trow"><div class="tlbl">Fabricantes</div><div class="tval" style="font-size:11px">'+p.fabricantes_grupo.map(function(f){return esc(f.nombre);}).join(' / ')+'</div></div>'
      :'')
      +'<div class="trow"><div class="tlbl">Dirección</div><div class="tval" style="font-size:11px">'+esc(p.direccion||'S/C')+'</div></div>'
      +'<div class="trow"><div class="tlbl">Contacto</div><div class="tval" style="font-size:11px">'+esc(p.contacto||'S/C')+'</div></div>'
      +'<div class="trow"><div class="tlbl">Teléfono</div><div class="tval" style="font-size:11px">'+esc(p.telefono||'S/C')+'</div></div>'
      +'<div class="trow"><div class="tlbl">Certificaciones</div><div class="tval" style="font-size:11px">'+esc(p.certificaciones||'S/C')+'</div></div>'
    +'</div>'
    +'<div class="tcard-foot">'
      +'<span class="pill '+apill(p.alerta)+'">'+esc(p.alerta)+'</span>'
      +'<span class="pill '+(p.estatus==='Calificado'?'pcal':'peval')+'">'+esc(p.estatus)+'</span>'
      +(p.pct?'<span style="font-size:12px;font-weight:600;color:'+bc+'">'+esc(p.pct)+'</span>':'')
      +'<span style="font-size:11px;color:#8a9bb0;margin-left:auto">'+esc(p.fecha_prox||'')+'</span>'
    +'</div>'
    +'</div>';
}

    +'<div class="kv"><span class="k">Prox. recalificacion</span><span class="v">'+(p.fecha_prox||'—')+'</span></div>'

function renderProdCard(pd,idx){
  var total=pd.total_ins||0,cal=pd.cal_ins||0,pct=total>0?Math.round(cal/total*100):0;
  var evTxt=pd.estado_val||'Por Validar';
  var evCls=evTxt==='Validado'?'ev-validado':evTxt==='Revalidar'?'ev-revalidar':'ev-porvalidar';
  var insRows=(pd.insumos||[]).slice(0,5).map(function(ins){
    return '<div class="ins-row"><span class="ins-dot '+(ins.status_prov==='Calificado'?'dot-cal':'dot-eva')+'"></span>'
      +'<span class="ins-cod">'+esc(ins.codigo)+'</span><span class="ins-desc">'+esc(ins.desc)+'</span>'
      +'<span class="ins-prov">'+esc(ins.proveedor)+'</span></div>';
  }).join('');
  var more=(pd.insumos||[]).length>5?'<div style="font-size:11px;color:#8a9bb0;padding:4px 0">+ '+((pd.insumos||[]).length-5)+' mas...</div>':'';
  return '<div class="pcard" data-idx="'+idx+'" data-mode="prod" onclick="openPDP('+idx+')">'
    +'<div class="pcard-head"><h3>'+esc(pd.nombre)+'</h3>'
    +'<div class="pmeta"><span class="'+evCls+'">'+esc(evTxt)+'</span>'+(pd.cliente?'<span style="font-size:11px;opacity:.85">'+esc(pd.cliente)+'</span>':'')+'</div></div>'
    +'<div class="pcard-body">'+insRows+more+'</div>'
    +'<div class="pcard-foot"><span style="color:#556677">Insumos</span>'
    +'<div class="prog-wrap"><div class="prog-fill" style="width:'+pct+'%"></div></div>'
    +'<span style="color:#1A9A50;font-weight:600">'+cal+'/'+total+' calificados</span></div></div>';
}

function filterList(){
  var q=document.getElementById('q').value.toLowerCase().trim();
  var tipo=document.getElementById('fTipo').value;
  var cli=document.getElementById('fCli').value;
  var est=document.getElementById('fEst').value;
  var al=document.getElementById('fAl').value;
  var list=PROVS.map(function(p,i){return {p:p,i:i};});
  if(q){var ts=q.split(' ').filter(Boolean);list=list.filter(function(x){return ts.every(function(t){return x.p._idx.indexOf(t)!==-1;});});}
  if(tipo)list=list.filter(function(x){return x.p.tipo===tipo;});
  if(cli)list=list.filter(function(x){return (x.p.clientes||[]).indexOf(cli)!==-1;});
  if(est)list=list.filter(function(x){return x.p.estatus===est;});
  if(al)list=list.filter(function(x){return (x.p.alerta||'').indexOf(al)!==-1;});
  return list;
}

function render(){
  var vista=document.getElementById('fVista').value;
  var prod=document.getElementById('fProd').value;
  var grid=document.getElementById('grid');

  /* ── Vista Calendario ── */
  if(vista==='calendario'){
    activeMode='calendario';
    renderCalendario();
    return;
  }

  /* ── Vista Productos ── */
  if(vista==='prod'||prod){
    document.getElementById('fVista').value='prod';
    activeMode='prod';
    grid.className='grid';
    var list=PD.filter(function(p){return !prod||p.nombre===prod;});
    var q=document.getElementById('q').value.toLowerCase().trim();
    if(q){var ts=q.split(' ').filter(Boolean);list=list.filter(function(x){return ts.every(function(t){return x._idx.indexOf(t)!==-1;});});}
    grid.innerHTML=list.length===0?'<div class="empty"><div style="font-size:44px">&#128270;</div><p>Sin resultados</p></div>':list.map(function(p){return renderProdCard(p,PD.indexOf(p));}).join('');
    document.getElementById('stTL').textContent='Productos';document.getElementById('stCL').textContent='Insumos cal.';
    document.getElementById('stT').textContent=list.length;
    document.getElementById('stC').textContent=list.reduce(function(a,p){return a+(p.cal_ins||0);},0);
    document.getElementById('stV').textContent='';document.getElementById('stP').textContent='';
    document.getElementById('rc').textContent=list.length+' producto'+(list.length!==1?'s':'');
    return;
  }

  /* ── Vista Tarjeta ── */
  if(vista==='tarjeta'){
    activeMode='tarjeta';
    grid.className='grid tarjeta-mode';
    var list=filterList();
    grid.innerHTML=list.length===0?'<div class="empty"><div style="font-size:44px">&#128270;</div><h3 style="color:#556677;margin-bottom:6px">Sin resultados</h3></div>':list.map(function(x){return renderTarjetaCard(x.p,x.i);}).join('');
    if(activeIdx!==null){var el=grid.querySelector('[data-idx="'+activeIdx+'"]');if(el)el.classList.add('active');}
    document.getElementById('stTL').textContent='Proveedores';document.getElementById('stCL').textContent='Calificados';
    document.getElementById('rc').textContent=list.length+' de '+PROVS.length+' proveedores';
    document.getElementById('stT').textContent=list.length;
    document.getElementById('stC').textContent=list.filter(function(x){return x.p.estatus==='Calificado';}).length;
    document.getElementById('stV').textContent=list.filter(function(x){return x.p.alerta==='Vencido';}).length;
    document.getElementById('stP').textContent=list.filter(function(x){return (x.p.alerta||'').indexOf('Por vencer')===0;}).length;
    return;
  }

  /* ── Vista Proveedores (default) ── */
  activeMode='prov';
  grid.className='grid';
  var list=filterList();
  grid.innerHTML=list.length===0?'<div class="empty"><div style="font-size:44px">&#128270;</div><h3 style="color:#556677;margin-bottom:6px">Sin resultados</h3><p>Ajusta los filtros.</p></div>':list.map(function(x){return renderProvCard(x.p,x.i);}).join('');
  if(activeIdx!==null){var el=grid.querySelector('[data-idx="'+activeIdx+'"]');if(el)el.classList.add('active');}
  document.getElementById('rc').textContent=list.length+' de '+PROVS.length+' proveedores';
  document.getElementById('stTL').textContent='Proveedores';document.getElementById('stCL').textContent='Calificados';
  document.getElementById('stT').textContent=list.length;
  document.getElementById('stC').textContent=list.filter(function(x){return x.p.estatus==='Calificado';}).length;
  document.getElementById('stV').textContent=list.filter(function(x){return x.p.alerta==='Vencido';}).length;
  document.getElementById('stP').textContent=list.filter(function(x){return (x.p.alerta||'').indexOf('Por vencer')===0;}).length;
}

  {nombre:'SMI',                 nprov:'P52', mes:8,  dia:0,  estado:'Pendiente'},
  {nombre:'LABORATORIO METROLOGIA COVERY (LMC)',nprov:'P27', mes:8,  dia:0,  estado:'Pendiente'},
  {nombre:'ASETEM',              nprov:'P03', mes:9,  dia:0,  estado:'Pendiente'},
  {nombre:'DTS',                 nprov:'P14', mes:10, dia:0,  estado:'Pendiente'},
  {nombre:'CENTRO DE SERVICIOS DE ANALISIS DE LABORATORIO (CS LAB)',nprov:'P62', mes:11, dia:0,  estado:'Pendiente'},
  {nombre:'TRULY NOLEN CHILE S.A.',nprov:'P54', mes:11, dia:0,  estado:'Pendiente'}
];

var MESES_NAMES=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function renderCalendario(){
  var grid=document.getElementById('grid');
  grid.className='';
  grid.style.padding='0';

  var semestre1=[5,6,7];
  var semestre2=[8,9,10,11,12];

  function renderMes(mes){
    var items=PROGRAMA_AUD.filter(function(a){return a.mes===mes;});
    var count=items.length;
    var rows=items.map(function(a){
      var cls=a.estado==='Realizada'?'cal-realizada':a.estado==='Programada'?'cal-programada':'cal-pendiente';
      var ecls=a.estado==='Realizada'?'r':a.estado==='Programada'?'p':'pd';
      var dia=a.dia>0?'Dia '+a.dia:'Por definir';
      return '<div class="cal-item '+cls+'" onclick="buscarProveedor(\''+a.nprov+'\')">'
        +'<span class="cal-nprov">'+esc(a.nprov)+'</span>'
        +'<span class="cal-nombre">'+esc(a.nombre)+'</span>'
        +'<span class="cal-dia">'+dia+'</span>'
        +'<span class="cal-estado '+ecls+'">'+esc(a.estado)+'</span>'
        +'</div>';
    }).join('');
    return '<div class="cal-mes">'
      +'<div class="cal-mes-header">'+MESES_NAMES[mes]
      +(count>0?'<span class="mes-count">'+count+'</span>':'')
      +'</div>'
      +'<div class="cal-mes-body">'
      +(count>0?rows:'<div class="cal-empty">Sin auditorias</div>')
      +'</div></div>';
  }

  var total=PROGRAMA_AUD.length;
  var realizadas=PROGRAMA_AUD.filter(function(a){return a.estado==='Realizada';}).length;
  var programadas=PROGRAMA_AUD.filter(function(a){return a.estado==='Programada';}).length;
  var pendientes=PROGRAMA_AUD.filter(function(a){return a.estado==='Pendiente';}).length;
  var pctReal=total>0?Math.round(realizadas/total*100):0;
  var colorReal=pctReal>=80?'#1A9A50':pctReal>=50?'#F5A623':'#E24B4A';
  var kpiHTML='<div class="cal-kpi-bar">'
    +'<div class="cal-kpi"><div class="cal-kpi-val" style="color:'+colorReal+'">'+pctReal+'%</div><div class="cal-kpi-lbl">Cumplimiento del programa</div></div>'
    +'<div class="cal-kpi"><div class="cal-kpi-val" style="color:#1A9A50">'+realizadas+'</div><div class="cal-kpi-lbl">Realizadas</div></div>'
    +'<div class="cal-kpi"><div class="cal-kpi-val" style="color:#2E74B5">'+programadas+'</div><div class="cal-kpi-lbl">Programadas</div></div>'
    +'<div class="cal-kpi"><div class="cal-kpi-val" style="color:#F5A623">'+pendientes+'</div><div class="cal-kpi-lbl">Pendientes</div></div>'
    +'<div class="cal-kpi"><div class="cal-kpi-val" style="color:#1F4E79">'+total+'</div><div class="cal-kpi-lbl">Total programa</div></div>'
    +'</div>'
    +'<div class="cal-progress-wrap">'
      +'<div class="cal-progress-title">Avance del Programa Anual de Auditorias 2026</div>'
      +'<div class="cal-progress-bar">'
        +'<div class="cal-progress-fill" style="width:'+pctReal+'%;background:'+colorReal+'">'
          +'<span class="cal-progress-pct">'+(pctReal>10?pctReal+'%':'')+'</span>'
        +'</div>'
      +'</div>'
      +'<div class="cal-progress-meta">'
        +'<span>0%</span>'
        +'<span style="font-weight:600;color:'+colorReal+'">'+pctReal+'% completado ('+realizadas+' de '+total+')</span>'
        +'<span>100%</span>'
      +'</div>'
    +'</div>';

  grid.innerHTML='<div class="cal-wrap">'
    +'<div class="cal-header">'
      +'<div>'
        +'<h2>Calendario de Auditorias a Proveedores 2026</h2>'
        +'<div style="font-size:12px;color:#667788;margin-top:3px">PGR-QA-009.04 Programa Anual de Auditorias Externas (Proveedores)</div>'
      +'</div>'
      +'<div class="cal-leyenda">'
        +'<div class="cal-ley-item"><div class="cal-ley-dot" style="background:#1A9A50"></div>Realizada ('+realizadas+')</div>'
        +'<div class="cal-ley-item"><div class="cal-ley-dot" style="background:#2E74B5"></div>Programada ('+programadas+')</div>'
        +'<div class="cal-ley-item"><div class="cal-ley-dot" style="background:#F5A623"></div>Pendiente ('+pendientes+')</div>'
        +'<div class="cal-ley-item" style="font-weight:600;color:#1F4E79">Total: '+total+' auditorias</div>'
      +'</div>'
    +'</div>'
    +kpiHTML+'<div class="cal-semestre-title">1er Semestre 2026 (Mayo \u2013 Julio)</div>'
    +'<div class="cal-semestre">'
      +semestre1.map(renderMes).join('')
    +'</div>'
    +'<div class="cal-semestre-title">2do Semestre 2026 (Agosto \u2013 Diciembre)</div>'
    +'<div class="cal-semestre">'
      +semestre2.map(renderMes).join('')
    +'</div>'
    +'</div>';

  document.getElementById('stTL').textContent='Auditorias';
  document.getElementById('stCL').textContent='Realizadas';
  document.getElementById('stT').textContent=total;
  document.getElementById('stC').textContent=realizadas;
  document.getElementById('stV').textContent=pendientes;
  document.getElementById('stP').textContent=programadas;
  document.getElementById('rc').textContent=total+' auditorias programadas 2026';
}

function buscarProveedor(nprov){
  if(nprov==='P00')return;
  document.getElementById('fVista').value='tarjeta';
  document.getElementById('q').value=nprov;
  render();
  // Abrir panel del proveedor si existe
  var idx=PROVS.findIndex(function(p){return p.n_prov===nprov;});
  if(idx>=0)openTP(idx);
}

init();


</script>
</body>
</html>
