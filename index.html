function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function apill(a){
  if(a==='Vigente')return 'pvig';
  if(a.indexOf('Vencido')===0)return 'pvenc';
  if(a.indexOf('Por vencer')===0)return 'ppv';
  if(a.indexOf('Pr\u00f3ximo')===0)return 'pprox';
  return 'ppend';
}
function pctColor(v){if(!v)return '#c5d0dd';var n=parseFloat(v);if(n>=90)return '#1A9A50';if(n>=70)return '#F5A623';return '#E24B4A';}
function evClass(e){if(e==='Validado')return 'ev-validado';if(e==='Revalidar')return 'ev-revalidar';return 'ev-porvalidar';}
function calcAlerta(fechaProx){
  if(!fechaProx)return 'Pendiente';
  var parts=fechaProx.split('/');
  if(parts.length!==3)return 'Pendiente';
  var d=new Date(parseInt(parts[2]),parseInt(parts[1])-1,parseInt(parts[0]));
  var today=new Date(); today.setHours(0,0,0,0);
  var dias=Math.round((d-today)/(1000*60*60*24));
  if(dias<0)return 'Vencido';
  if(dias<=90)return 'Por vencer ('+dias+'d)';
  if(dias<=180)return 'Pr\u00f3ximo ('+dias+'d)';
  return 'Vigente';
}
function fmtDate(raw){
  if(!raw||raw==='')return '';

      return p[0]+'/'+p[1]+'/'+p[2];
    }
  }
  return raw;
}

// ── Parsear CSV de Google Sheets ──────────────────────────────────
function parseCSV(text){
  var rows=[], cur=[], field='', inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(inQ){if(c==='"'&&text[i+1]==='"'){field+='"';i++;}else if(c==='"'){inQ=false;}else{field+=c;}}
    else{if(c==='"'){inQ=true;}else if(c===','){cur.push(field.trim());field='';}
    else if(c==='\n'||c==='\r'){if(c==='\r'&&text[i+1]==='\n')i++;cur.push(field.trim());rows.push(cur);cur=[];field='';}
    else{field+=c;}}
  }
  if(field||cur.length)cur.push(field.trim());
  if(cur.length>0&&cur.some(function(x){return x!=='';}))rows.push(cur);
  return rows;
}

  });

function processMatriz(csv){
  var rows=parseCSV(csv);
  if(rows.length<2)return;
  // Columnas: 0=N°PROV,1=PROVEEDOR,2=TIPO,3=IMPORTANCIA,4=CLIENTE,5=CODIGO,6=DESC,7=FABRICANTE
  // 8=FECHA_ULT,9=MES,10=ANO,11=FREC,12=PROXIMA,13=ANO_PROX,14=PCT,15=ESTATUS,16=COD_REPORTE,17=N_CERT
  // 18=N_CERT_FAB,19=VIG_FAB,20=OBS
  var provMap={};
  for(var i=1;i<rows.length;i++){
    var r=rows[i];
    if(!r[1]||r[1]==='')continue;
    var nprov=(r[0]||'').trim();
    var nombre=(r[1]||'').trim();
    var key=nprov+'||'+nombre;
    var pct=r[14]||'';
    if(pct==='-'||pct==='—')pct='';
    if(pct!==''){
      var pv=parseFloat(pct);
      if(!isNaN(pv)){
        if(pv>1)pv=pv/100;
        pct=(pv*100).toFixed(1)+'%';
      }
    }
    var fechaProx=fmtDate(r[12]||'');
    // Limpiar fechas 1900
    if(fechaProx.indexOf('1900')!==-1||fechaProx.indexOf('1903')!==-1||fechaProx.indexOf('1904')!==-1)fechaProx='';
    var fechaUlt=fmtDate(r[8]||'');
    if(fechaUlt.indexOf('1900')!==-1||fechaUlt.indexOf('1903')!==-1||fechaUlt.indexOf('1904')!==-1)fechaUlt='';
    var ncert=(r[17]||'').trim();
    var codreporte=(r[16]||'').trim();
    var driveId=getDriveId(nprov,ncert,codreporte);
    if(!provMap[key]){
      provMap[key]={
        n_prov:nprov, proveedor:nombre, tipo:(r[2]||'').trim(),
        importancia:(r[3]||'').trim(), pct:pct,
        estatus:(r[15]||'Por Evaluar').trim(),
        alerta:calcAlerta(fechaProx),
        fecha_ult:fechaUlt, fecha_prox:fechaProx,
        frecuencia:(r[11]||'').trim(),
        cod_reporte:codreporte, n_cert:ncert,
        n_cert_fab:(r[18]||'').trim(), vig_fab:fmtDate(r[19]||''),
        obs:(r[20]||'').trim(), clientes:[], materiales:[],
        productos:[], productos_detalle:[], drive_id:driveId, _mkeys:{}
      };
    }
    var p=provMap[key];
    var cli=(r[4]||'').trim();
    if(cli&&p.clientes.indexOf(cli)===-1)p.clientes.push(cli);
    var mkey=(r[5]||'')+'|'+(r[6]||'');
    if(!p._mkeys[mkey]){
      p._mkeys[mkey]=1;
      p.materiales.push({codigo_mat:(r[5]||'').trim(),descripcion:(r[6]||'').trim(),fabricante:(r[7]||'').trim(),cliente:cli});
    }
    if(!p.pct&&pct)p.pct=pct;
    if(!p.fecha_prox&&fechaProx){p.fecha_prox=fechaProx;p.alerta=calcAlerta(fechaProx);}
  }
  PROVS=[];
  for(var k in provMap){var px=provMap[k];delete px._mkeys;PROVS.push(px);}
  PROVS.sort(function(a,b){return a.proveedor.localeCompare(b.proveedor);});
}

function processProductos(csv){
  var rows=parseCSV(csv);
  if(rows.length<2)return;
  // 0=CLIENTE,1=ESTADO_VAL,2=PRODUCTO,3=CODIGO,4=DESC,5=N°P,6=PROVEEDOR,7=FAB,8=PUNTAJE,9=STATUS_PROV
  // 10=REP_CALI,11=REP_VAL,12=FECHA_VAL,13=FREC,14=VIGENCIA,15=COL2,16=ESTADO2,17=OBS
  var prodMap={};
  PRODS_ALL=[];
  for(var i=1;i<rows.length;i++){
    var r=rows[i];
    var prod=(r[2]||'').trim();
    var np=(r[5]||'').trim();
    if(!prod||!np)continue;
    if(!prodMap[prod]){
      prodMap[prod]={nombre:prod,estado_val:(r[16]||r[1]||'').trim(),cliente:(r[0]||'').trim(),
        rep_val:(r[11]||'').trim(),fecha_val:fmtDate(r[12]||''),insumos:[],_ikeys:{}};
      PRODS_ALL.push(prod);
    }
    var pm=prodMap[prod];
    if(!pm.estado_val&&(r[16]||r[1]))pm.estado_val=(r[16]||r[1]).trim();
    var ikey=(r[3]||'')+'|'+np;
    if(!pm._ikeys[ikey]){
      pm._ikeys[ikey]=1;
      pm.insumos.push({codigo:(r[3]||'').trim(),desc:(r[4]||'').trim(),n_p:np,
        proveedor:(r[6]||'').trim(),fabricante:(r[7]||'').trim(),
        status_prov:(r[9]||'').trim(),obs:(r[17]||'').trim()});
    }
  }
  PRODS_DET=[];
  for(var pk in prodMap){
    var pd=prodMap[pk];delete pd._ikeys;
    pd.total_ins=pd.insumos.length;
    pd.cal_ins=pd.insumos.filter(function(x){return x.status_prov==='Calificado';}).length;
    PRODS_DET.push(pd);
  }
  PRODS_DET.sort(function(a,b){return a.nombre.localeCompare(b.nombre);});
  PRODS_ALL.sort();

  // Cruzar productos con proveedores
  PROVS.forEach(function(p){
    PRODS_DET.forEach(function(pd){
      var insProveedor=pd.insumos.filter(function(ins){return ins.n_p===p.n_prov;});
      if(insProveedor.length>0){
        if(p.productos.indexOf(pd.nombre)===-1)p.productos.push(pd.nombre);
        p.productos_detalle.push({nombre:pd.nombre,estado_val:pd.estado_val,insumos:insProveedor});
      }
    });
  });
}

function buildIndex(){
  PROVS.forEach(function(p){
    p._idx=[p.n_prov,p.proveedor,p.n_cert,p.cod_reporte]
      .concat(p.productos)
      .concat(p.materiales.map(function(m){return m.codigo_mat+' '+m.descripcion+' '+m.fabricante;}))
      .join(' ').toLowerCase();
  });
  PRODS_DET.forEach(function(p){
    p._idx=[p.nombre,p.cliente,p.rep_val]
      .concat(p.insumos.map(function(i){return i.codigo+' '+i.desc+' '+i.proveedor;}))
      .join(' ').toLowerCase();
  });
}

function buildSelects(){
  var selProd=document.getElementById('fProd');
  while(selProd.options.length>1)selProd.remove(1);
  PRODS_ALL.forEach(function(pr){var o=document.createElement('option');o.value=o.textContent=pr;selProd.appendChild(o);});
  var clis=[];
  PROVS.forEach(function(p){p.clientes.forEach(function(c){if(c&&clis.indexOf(c)===-1)clis.push(c);});});
  clis.sort();
  var selCli=document.getElementById('fCli');
  while(selCli.options.length>1)selCli.remove(1);
  clis.forEach(function(c){var o=document.createElement('option');o.value=o.textContent=c;selCli.appendChild(o);});
}

  var pd=PRODS_DET[idx];if(!pd)return;
  activeIdx=idx;activeMode='prod';
  document.querySelectorAll('.card,.pcard').forEach(function(c){c.classList.remove('active');});
  var card=document.querySelector('[data-idx="'+idx+'"][data-mode="prod"]');if(card)card.classList.add('active');
  document.getElementById('panelHdr').className='ph green';
  document.getElementById('pT').textContent=pd.nombre;
  document.getElementById('pS').textContent='Estado: '+(pd.estado_val||'Por Validar')+(pd.cliente?' \u00b7 '+pd.cliente:'')+(pd.fecha_val?' \u00b7 Val. '+pd.fecha_val:'');
  var total=pd.total_ins,cal=pd.cal_ins,pct=total>0?Math.round(cal/total*100):0;
  var insRows=pd.insumos.map(function(ins){
    var stCls=ins.status_prov==='Calificado'?'ins-cal':'ins-eva';
    var dotCls=ins.status_prov==='Calificado'?'dot-cal':'dot-eva';
    return '<tr><td><span class="ins-dot '+dotCls+'" style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle"></span>'
      +'<span class="ins-cod">'+esc(ins.codigo)+'</span></td>'
      +'<td>'+esc(ins.desc)+'</td><td>'+esc(ins.n_p)+' '+esc(ins.proveedor)+'</td>'
      +'<td style="color:#556677;font-size:11px">'+esc(ins.fabricante)+'</td>'
      +'<td class="'+stCls+'">'+esc(ins.status_prov)+'</td></tr>';
  }).join('');
  document.getElementById('pB').innerHTML=
    '<div class="psec"><div class="ptitle">Estado del producto</div><div class="fgrid">'
    +'<span class="fl">Validaci\u00f3n</span><span class="fv" style="font-weight:600">'+(pd.estado_val||'Por Validar')+'</span>'
    +(pd.rep_val?'<span class="fl">Reporte val.</span><span class="fv" style="font-family:monospace;font-size:12px">'+esc(pd.rep_val)+'</span>':'')
    +(pd.fecha_val?'<span class="fl">Fecha val.</span><span class="fv">'+esc(pd.fecha_val)+'</span>':'')
    +(pd.cliente?'<span class="fl">Cliente</span><span class="fv">'+esc(pd.cliente)+'</span>':'')
    +'<span class="fl">Cobertura</span><span class="fv"><strong style="color:#1A9A50">'+cal+'</strong> de '+total+' calificados ('+pct+'%)</span>'
    +'</div></div>'
    +'<div class="psec"><div class="ptitle">Insumos ('+total+')</div>'
    +'<div style="overflow-x:auto"><table class="ins-table"><thead><tr><th>C\u00f3digo</th><th>Descripci\u00f3n</th><th>Proveedor</th><th>Fabricante</th><th>Status</th></tr></thead>'
    +'<tbody>'+insRows+'</tbody></table></div></div>'
    +(pd.insumos.some(function(i){return i.obs&&i.obs!=='Sin obs.';})
      ?'<div class="psec"><div class="ptitle">Observaciones</div>'
        +pd.insumos.filter(function(i){return i.obs&&i.obs!=='Sin obs.';}).map(function(i){
          return '<div style="margin-bottom:10px"><p style="font-size:11px;font-family:monospace;color:#1557A0;margin-bottom:3px">'+esc(i.codigo)+' \u2014 '+esc(i.desc)+'</p>'
            +'<p style="font-size:12px;color:#445566;line-height:1.55">'+esc(i.obs)+'</p></div>';
        }).join('')+'</div>'
      :'');
  document.getElementById('panel').classList.add('open');
  document.getElementById('ov').classList.add('on');
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('ov').classList.remove('on');
  document.querySelectorAll('.card,.pcard').forEach(function(c){c.classList.remove('active');});
  activeIdx=null;
}

document.getElementById('q').addEventListener('input',render);
['fProd','fTipo','fCli','fEst','fAl'].forEach(function(id){document.getElementById(id).addEventListener('change',render);});
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closePanel();
  if(e.key==='/'&&document.activeElement.id!=='q'){e.preventDefault();document.getElementById('q').focus();}
});

loadData();
</script>
</body>
</html>
