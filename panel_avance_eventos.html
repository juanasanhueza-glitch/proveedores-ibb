<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Avance — Eventos de Calidad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #EFF2F4;
  --panel: #FFFFFF;
  --ink: #1B232C;
  --ink-soft: #5B6873;
  --line: #D7DEE3;
  --line-strong: #B9C3CA;
  --petrol: #2563A8;
  --petrol-dark: #1F4E79;
  --petrol-tint: #EAF1FA;
  --amber: #B9790A;
  --amber-tint: #FBF0DC;
  --brick: #A93B30;
  --brick-tint: #F8E6E2;
  --sage: #2563A8;
  --sage-tint: #DBEAFE;
  --slate-tint: #E9ECEF;
  --radius: 3px;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --cond: 'IBM Plex Sans Condensed', sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--petrol);color:#fff;}

header.shell{
  background:var(--petrol-dark);
  color:#fff;
  padding:22px 28px 18px;
  border-bottom:4px solid var(--petrol);
}
.header-row{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  flex-wrap:wrap;
  gap:14px;
  max-width:1320px;
  margin:0 auto;
}
.title-block{display:flex;flex-direction:column;gap:4px;}
.eyebrow{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:#9FC3CE;
}
h1{
  font-family:var(--cond);
  font-weight:700;
  font-size:28px;
  margin:0;
  letter-spacing:-0.01em;
}
.meta-line{
  font-family:var(--mono);
  font-size:11.5px;
  color:#BFD6DD;
}
.kpi-strip{display:flex;gap:22px;flex-wrap:wrap;}
.kpi{
  text-align:right;
  border-right:1px solid rgba(255,255,255,.18);
  padding-right:18px;
  background:none;
  border-top:none;
  border-bottom:none;
  border-left:none;
  cursor:pointer;
  font-family:inherit;
  color:inherit;
  border-radius:4px;
  transition:opacity .15s;
}
.kpi:hover{opacity:.78;}
.kpi:hover .lbl{text-decoration:underline;}
.kpi:last-child{border-right:none;padding-right:0;}
.kpi .num{
  font-family:var(--cond);
  font-weight:700;
  font-size:26px;
  line-height:1;
  display:block;
}
.kpi .lbl{
  font-family:var(--mono);
  font-size:10.5px;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:#A9C9D1;
}
.kpi.warn .num{color:#F0C572;}
.kpi.crit .num{color:#F2A89A;}
.kpi.ok .num{color:#8FC2EA;}

nav.tabs{
  background:var(--panel);
  border-bottom:1px solid var(--line);
  position:sticky;
  top:0;
  z-index:50;
}
.tabs-inner{
  max-width:1320px;
  margin:0 auto;
  display:flex;
  overflow-x:auto;
}
.tab-btn{
  font-family:var(--cond);
  font-weight:600;
  font-size:14px;
  color:var(--ink-soft);
  background:none;
  border:none;
  padding:14px 18px 12px;
  cursor:pointer;
  border-bottom:3px solid transparent;
  white-space:nowrap;
  display:flex;
  align-items:center;
  gap:8px;
  transition:color .15s, border-color .15s;
}
.tab-btn .count{
  font-family:var(--mono);
  font-size:11px;
  background:var(--slate-tint);
  color:var(--ink-soft);
  padding:1px 6px;
  border-radius:10px;
}
.tab-btn:hover{color:var(--ink);}
.tab-btn.active{
  color:var(--petrol-dark);
  border-bottom-color:var(--petrol);
}
.tab-btn.active .count{
  background:var(--petrol-tint);
  color:var(--petrol-dark);
}

main{
  max-width:1320px;
  margin:0 auto;
  padding:26px 28px 80px;
}
.view{display:none;}
.view.active{display:block;animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.section-head{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:4px;
}
.section-head h2{
  font-family:var(--cond);
  font-size:21px;
  font-weight:700;
  margin:0;
}
.section-sub{
  color:var(--ink-soft);
  font-size:13px;
  max-width:760px;
  margin:2px 0 18px;
}

.grid-2{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media (max-width:860px){.grid-2,.grid-3{grid-template-columns:1fr;}}
@media (max-width:1300px) and (min-width:861px){.grid-3{grid-template-columns:repeat(3,1fr) !important;}}
@media (max-width:1100px) and (min-width:861px){.grid-3{grid-template-columns:repeat(2,1fr) !important;}}

.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px 20px;
}
.card h3{
  font-family:var(--cond);
  font-size:15px;
  font-weight:700;
  margin:0 0 12px;
  display:flex;
  align-items:center;
  gap:8px;
}
.card h3 .tag{
  font-family:var(--mono);
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:var(--ink-soft);
}

.bar-row{
  display:grid;
  grid-template-columns:150px 1fr 38px;
  align-items:center;
  gap:10px;
  padding:6px 0;
  border-bottom:1px solid var(--slate-tint);
}
.bar-row:last-child{border-bottom:none;}
.bar-row .label{font-size:12.5px;font-weight:500;}
.bar-track{background:var(--slate-tint);border-radius:2px;height:9px;overflow:hidden;}
.bar-fill{height:100%;background:var(--petrol);border-radius:2px;}
.bar-row .val{font-family:var(--mono);font-size:12px;text-align:right;color:var(--ink-soft);}

.resp-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:9px 0;
  border-bottom:1px solid var(--slate-tint);
  gap:10px;
}
.resp-row:last-child{border-bottom:none;}
.resp-name{font-size:12.5px;font-weight:500;}
.resp-detail{font-size:11px;color:var(--ink-soft);font-family:var(--mono);}
.resp-count{
  font-family:var(--mono);
  font-weight:600;
  font-size:14px;
  background:var(--petrol-tint);
  color:var(--petrol-dark);
  padding:2px 9px;
  border-radius:12px;
  flex-shrink:0;
}

.table-wrap{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:hidden;
}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead th{
  text-align:left;
  font-family:var(--mono);
  font-size:10.5px;
  letter-spacing:.04em;
  text-transform:uppercase;
  color:var(--ink-soft);
  background:var(--slate-tint);
  padding:9px 12px;
  border-bottom:1px solid var(--line-strong);
  position:sticky;
  top:48px;
}
tbody td{
  padding:10px 12px;
  border-bottom:1px solid var(--slate-tint);
  vertical-align:top;
}
tbody tr:hover{background:var(--petrol-tint);}
.id-cell{font-family:var(--mono);font-weight:600;white-space:nowrap;}
.id-secondary{
  display:block;
  font-family:var(--mono);
  font-weight:400;
  font-size:10px;
  color:var(--ink-soft);
  white-space:nowrap;
}
.days-cell{font-family:var(--mono);text-align:right;white-space:nowrap;}
.action-cell{max-width:360px;}
.urgency-bar{width:4px;display:inline-block;height:28px;vertical-align:middle;margin-right:8px;border-radius:1px;}

.pill{
  display:inline-block;
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:.03em;
  text-transform:uppercase;
  padding:2px 7px;
  border-radius:10px;
  font-weight:600;
  white-space:nowrap;
}
.pill-capa{background:var(--petrol-tint);color:var(--petrol-dark);}
.pill-desvio{background:var(--amber-tint);color:var(--amber);}
.pill-nc{background:var(--brick-tint);color:var(--brick);}
.pill-aviso{background:var(--slate-tint);color:var(--ink-soft);}
.pill-oos{background:#F0E2F2;color:#7A3D80;}
.pill-reclamo{background:#DCE7F5;color:#2E5C92;}
.pill-fueraplazo{background:var(--brick);color:#fff;}
.pill-emision{background:var(--sage-tint);color:var(--sage);}
.pill-vigente{background:var(--sage-tint);color:var(--sage);}
.pill-evidencia{background:var(--sage);color:#fff;}
.pill-revisar{background:var(--amber-tint);color:var(--amber);}

.filter-bar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:14px;
  align-items:center;
}
.filter-bar select, .filter-bar input[type="text"]{
  font-family:var(--sans);
  font-size:12.5px;
  border:1px solid var(--line-strong);
  border-radius:var(--radius);
  padding:7px 10px;
  background:#fff;
  color:var(--ink);
}
.filter-bar input[type="text"]{min-width:220px;}
.filter-bar .result-count{
  font-family:var(--mono);
  font-size:11.5px;
  color:var(--ink-soft);
  margin-left:auto;
}
.clear-btn{
  font-family:var(--mono);
  font-size:11px;
  background:none;
  border:1px solid var(--line-strong);
  border-radius:var(--radius);
  padding:7px 10px;
  cursor:pointer;
  color:var(--ink-soft);
}
.clear-btn:hover{border-color:var(--petrol);color:var(--petrol-dark);}

.dup-group{
  background:var(--panel);
  border:1px solid var(--line);
  border-left:4px solid var(--petrol);
  border-radius:var(--radius);
  padding:16px 18px;
  margin-bottom:14px;
}
.dup-group-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:14px;
  margin-bottom:10px;
}
.dup-group-text{
  font-size:13.5px;
  font-weight:500;
  line-height:1.45;
  flex:1;
}
.dup-count-badge{
  font-family:var(--mono);
  font-weight:700;
  font-size:13px;
  background:var(--petrol);
  color:#fff;
  padding:4px 10px;
  border-radius:12px;
  flex-shrink:0;
}
.dup-events{display:flex;flex-wrap:wrap;gap:8px;}
.dup-event-chip{
  font-family:var(--mono);
  font-size:11px;
  background:var(--slate-tint);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:4px 8px;
  display:flex;
  gap:6px;
  align-items:center;
}
.chip-registro{
  font-size:9.5px;
  color:var(--ink-soft);
  background:#fff;
  border:1px solid var(--line);
  border-radius:8px;
  padding:1px 5px;
}
.dup-same-origin{
  font-size:11.5px;
  color:var(--petrol-dark);
  background:var(--petrol-tint);
  border-radius:var(--radius);
  padding:6px 10px;
  margin-bottom:10px;
}
.dup-event-chip .resp{color:var(--ink-soft);font-family:var(--sans);}

.cross-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:16px 18px;
  margin-bottom:12px;
  display:grid;
  grid-template-columns:1fr 28px 1fr;
  gap:14px;
  align-items:center;
}
@media (max-width:760px){.cross-card{grid-template-columns:1fr;}}
.cross-card.valid{border-left:4px solid var(--sage);}
.cross-card.review{border-left:4px solid var(--amber);}
.cross-side h4{
  font-family:var(--mono);
  font-size:10.5px;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:var(--ink-soft);
  margin:0 0 6px;
}
.cross-side .id-line{font-family:var(--mono);font-weight:700;font-size:13px;margin-bottom:4px;}
.cross-side .desc{font-size:12.5px;color:var(--ink-soft);line-height:1.4;}
.cross-arrow{
  font-size:18px;
  color:var(--line-strong);
  text-align:center;
}
.cross-verdict{
  grid-column:1/-1;
  border-top:1px solid var(--slate-tint);
  padding-top:10px;
  margin-top:4px;
  font-size:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.qw-row{
  display:grid;
  grid-template-columns:120px 90px 1fr 200px 70px 230px;
  gap:12px;
  align-items:center;
  padding:11px 16px;
  border-bottom:1px solid var(--slate-tint);
}
.qw-row:last-child{border-bottom:none;}
.qw-row-head{
  background:var(--slate-tint);
  font-family:var(--mono);
  font-size:10.5px;
  text-transform:uppercase;
  letter-spacing:.04em;
  color:var(--ink-soft);
}
@media (max-width:900px){.qw-row{grid-template-columns:1fr;gap:4px;}}

/* ===== Personal tracking widget (localStorage only, never touches source data) ===== */
.track-counter{
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-soft);
  background:var(--slate-tint);
  display:inline-block;
  padding:5px 10px;
  border-radius:12px;
  margin-bottom:14px;
}
.track-widget{
  display:flex;
  flex-direction:column;
  gap:4px;
  min-width:180px;
}
.track-check{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  color:var(--ink-soft);
  cursor:pointer;
  user-select:none;
}
.track-check input{
  width:14px;
  height:14px;
  accent-color:var(--petrol);
  cursor:pointer;
}
.track-widget.is-done .track-check{
  color:var(--petrol-dark);
  font-weight:600;
}
.track-note{
  font-family:var(--sans);
  font-size:11.5px;
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:5px 8px;
  background:#fff;
  width:100%;
}
.track-note:focus{outline:none;border-color:var(--petrol);}
.track-widget.is-locked .track-check{color:var(--ink-soft);cursor:not-allowed;}
.track-widget.is-locked .track-checkbox{cursor:not-allowed;opacity:.5;}
.track-widget.is-locked .track-note{background:var(--slate-tint);color:var(--ink-soft);cursor:not-allowed;}
.dup-track, .cross-track{
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid var(--slate-tint);
  max-width:340px;
}
.cross-track{grid-column:1/-1;max-width:none;}

.sop-code{
  font-family:var(--mono);
  font-weight:700;
  background:var(--petrol-tint);
  color:var(--petrol-dark);
  padding:1px 7px;
  border-radius:4px;
  margin-right:4px;
}
.sop-doc-info{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  background:var(--slate-tint);
  border-radius:var(--radius);
  padding:8px 12px;
  margin-bottom:12px;
  font-size:12px;
}
.sop-doc-desc{font-weight:500;}
.sop-doc-meta{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-left:auto;}
.sop-doc-missing{color:var(--amber);font-style:italic;}
.sop-events-list{display:flex;flex-direction:column;gap:8px;}
.sop-event-row{
  display:flex;
  gap:14px;
  align-items:flex-start;
  background:var(--slate-tint);
  border-radius:var(--radius);
  padding:9px 12px;
}
.sop-event-id{
  flex-shrink:0;
  width:110px;
  font-family:var(--mono);
  display:flex;
  flex-direction:column;
  gap:3px;
}
.sop-event-detail{flex:1;min-width:0;}
.sop-event-action{font-size:12.5px;line-height:1.4;}
.sop-event-meta{font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);margin-top:3px;}
@media (max-width:700px){.sop-event-row{flex-direction:column;}.sop-event-id{width:auto;flex-direction:row;align-items:center;}}

.empty-state{
  text-align:center;
  padding:50px 20px;
  color:var(--ink-soft);
  font-family:var(--mono);
  font-size:12.5px;
}

footer{
  text-align:center;
  font-family:var(--mono);
  font-size:11px;
  color:var(--ink-soft);
  padding:24px;
}

.lock-bar{
  background:var(--ink);
  color:#fff;
  font-family:var(--mono);
  font-size:11.5px;
  padding:7px 20px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
}
.lock-status{color:rgba(255,255,255,.75);}
.lock-status.unlocked{color:#A9D4B8;}
.lock-btn{
  font-family:var(--mono);
  font-size:11px;
  background:rgba(255,255,255,.12);
  color:#fff;
  border:1px solid rgba(255,255,255,.25);
  border-radius:var(--radius);
  padding:4px 10px;
  cursor:pointer;
}
.lock-btn:hover{background:rgba(255,255,255,.22);}
</style>
</head>
<body>

<header class="shell">
  <div class="header-row">
    <div class="title-block">
      <span class="eyebrow">Aseguramiento de Calidad · Seguimiento operativo</span>
      <h1>Panel de Avance de Eventos</h1>
      <span class="meta-line" id="meta-line">—</span>
    </div>
    <div class="kpi-strip" id="kpi-strip"></div>
  </div>
</header>

<nav class="tabs">
  <div class="tabs-inner" id="tabs-inner"></div>
</nav>

<main id="main"></main>

C del área de muestreo sin vigencia de calificación\nEn el área de muestreo de Material de Envase y Empaque (MEE), se constató que el sistema HVAC no cuenta con calificación vigente. Además, que la esclusa de muestreo es de tipo “tapón”, contando solo con inyección de aire, sin ninguna ", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-445", "tipo": "CAPA", "estado": "Abierto", "area": "Mantenimiento", "responsable": "Rubén Montenegro/Jefe de Mantenimiento", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Fuera de plazo", "accion": "Se evaluará instalar cubierta protectora en panel eléctrico en zona de almacenamiento de área bodega, actualmente sin cubierta protectora.", "descripcion": "5._Panel eléctrico descubierto en zona de almacenamiento\nSe observó un panel eléctrico sin cubierta protectora en el área de bodega. Además de estar\ndescubierto, no cuenta con señalización ni advertencias visuales de riesgo.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-446", "tipo": "CAPA", "estado": "Abierto", "area": "Producción", "responsable": "Rodrigo Sambuceti/Gerente de Producción", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Con fecha", "accion": "Se evaluará en mediano plazo en área de recepción, el sistema de inyección/extracción de aire, levantando requisitos y tiempos de implementación del proyecto (no esta contemplado a corto plazo).", "descripcion": "6._Área de recepción sin sistema de inyección/extracción de aire\nEl área presenta ventilación limitada, sin sistemas de inyección ni extracción de aire.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-447", "tipo": "CAPA", "estado": "Abierto", "area": "Validaciones", "responsable": "Bastían Torres/Asist. Validación y calificación", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Fuera de plazo", "accion": "Reporte de mapeo térmico de bodega de recepción de MP (verano e invierno).", "descripcion": "7._Falta de monitoreo continuo y mapeo térmico\nLas bodegas no cuentan con monitoreo continuo de temperatura y humedad (sin datalogger ni\nalarmas) y tampoco con un mapeo térmico que demuestre la homogeneidad de las condiciones\nambientales. La revisión de la bitácora de cámaras indicó que los registro", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-448", "tipo": "CAPA", "estado": "Abierto", "area": "Bodega", "responsable": "Pablo Garrido/Supervisor de Bodega", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Fuera de plazo", "accion": "Delimitar áreas de tránsito y almacenamiento en layout, para el caso de que se necesitara como zonas de almacenamiento transitorio", "descripcion": "8._Pallets con materias primas en “pasillo” sin codificación formal de ubicación. Se encontraron pallets de materias primas en proceso de muestreo ubicados en un “pasillo”, el cual no cuenta con codificación formal ni se encuentra definido como área de almacenamiento. A pesar de que\nen el sistema fi", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-449", "tipo": "CAPA", "estado": "Abierto", "area": "Bodega", "responsable": "Pablo Garrido/Supervisor de Bodega", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Fuera de plazo", "accion": "Liberación de vía de evacuación inmediata en área bodega", "descripcion": "9._Obstrucción del flujo seguro de tránsito por pallets en puerta de salida .Se constató que la puerta de salida de envases se encontraba obstruida por pallets de materiales pendientes de muestreo, impidiendo un adecuado flujo operacional y comprometiendo vías de evacuación.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-450", "tipo": "CAPA", "estado": "Abierto", "area": "Seguridad Industrial", "responsable": "Ignacio Fuentes/Prevencionista de riesgo", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Sin fecha", "accion": "Capacitación en seguridad y zonas de no-bloqueo en área bodega", "descripcion": "9._Obstrucción del flujo seguro de tránsito por pallets en puerta de salida .Se constató que la puerta de salida de envases se encontraba obstruida por pallets de materiales pendientes de muestreo, impidiendo un adecuado flujo operacional y comprometiendo vías de evacuación.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-452", "tipo": "CAPA", "estado": "Abierto", "area": "Mantenimiento", "responsable": "Rubén Montenegro/Jefe de Mantenimiento", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Fuera de plazo", "accion": "Instalar flechas de flujo y etiquetas de identificación en zona de bodega, flujos y rotulo de identificación.", "descripcion": "11._Ductos sin identificación ni sentido de flujo: Los ductos observados en la zona de bodega no poseen rotulación de identificación de contenido ni flechas de sentido de flujo.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-453", "tipo": "CAPA", "estado": "Abierto", "area": "Producción", "responsable": "Rodrigo Sambuceti/Gerente de Producción", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Con fecha", "accion": "Adquisición de pallets (parcializado) para el almacenamiento de bodega", "descripcion": "12._Falta de pallets de retención para materias primas líquidas Las materias primas líquidas almacenadas no se encuentran sobre pallets de retención de líquidos.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-454", "tipo": "CAPA", "estado": "Abierto", "area": "Bodega", "responsable": "Pablo Garrido/Supervisor de Bodega", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Fuera de plazo", "accion": "Reubicar a niveles bajos del rack; almacenamiento bodega", "descripcion": "13._Almacenamiento de corrosivos en zonas altas del rack .Se observan materias primas clasificadas como corrosivas almacenadas en posiciones superiores del rack, lo que implica mayor riesgo operacional en caso de caída o derrame y dificulta su manipulación segura.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-455", "tipo": "CAPA", "estado": "Abierto", "area": "Seguridad Industrial", "responsable": "Ignacio Fuentes/Prevencionista de riesgo", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Sin fecha", "accion": "Evaluar matriz de riesgos por ubicación de estantería y generación de SOP sobre el tema Salud y Seguridad infraestructura", "descripcion": "13._Almacenamiento de corrosivos en zonas altas del rack .Se observan materias primas clasificadas como corrosivas almacenadas en posiciones superiores del rack, lo que implica mayor riesgo operacional en caso de caída o derrame y dificulta su manipulación segura.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-456", "tipo": "CAPA", "estado": "Abierto", "area": "Bodega", "responsable": "Pablo Garrido/Supervisor de Bodega", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Sin fecha", "accion": "Generación de SOP sobre el tema  Salud y Seguridad infraestructura (almacenamiento de bodega)", "descripcion": "13._Almacenamiento de corrosivos en zonas altas del rack .Se observan materias primas clasificadas como corrosivas almacenadas en posiciones superiores del rack, lo que implica mayor riesgo operacional en caso de caída o derrame y dificulta su manipulación segura.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-457", "tipo": "CAPA", "estado": "Abierto", "area": "Bodega", "responsable": "Pablo Garrido/Supervisor de Bodega", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Fuera de plazo", "accion": "Actualización de SOP BB-001 \"Recepción de materias primas y material de empaque y semi-elaborados importados\", incluir y reforzar inspección en recepción de materias primas.", "descripcion": "14._Almidón de maíz con evidencia de filtración y humedad: Se identificó un saco de almidón de maíz con clara evidencia de filtración, polvo en su superficie, humedad y daño en su envase. La MP no se encontraba segregada ni identificada como material en cuarentena o bajo investigación", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-459", "tipo": "CAPA", "estado": "Abierto", "area": "Bodega", "responsable": "Pablo Garrido/Supervisor de Bodega", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Fuera de plazo", "accion": "Actualización de SOP BB-055: despacho, limpieza, pesaje y uso de materias primas", "descripcion": "16._Sala de fraccionamiento: uso de bolsa sobre materias primas para ingreso\nPara ingresar las materias primas a la sala de fraccionamiento, el operario cubre el bulto con una bolsa plástica, lo que no cuenta con procedimiento ni respaldo técnico.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-460", "tipo": "CAPA", "estado": "Abierto", "area": "Mantenimiento", "responsable": "Rubén Montenegro/Jefe de Mantenimiento", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Con fecha", "accion": "Ejecutar el recambio del piso actual a piso que cumpla condiciones sanitarias, salud y seguridad en infraestructura", "descripcion": "17._Piso en mal estado en áreas comunes\nDurante el recorrido se observaron sectores del piso en mal estado, con desgaste y fisuras.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-461", "tipo": "CAPA", "estado": "Abierto", "area": "Bodega", "responsable": "Pablo Garrido/Supervisor de Bodega", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Fuera de plazo", "accion": "Actualización de SOP BB-055: despacho, limpieza, pesaje y uso de materias primas", "descripcion": "18._Uso de film plástico sin criterio documentado o estándar definido\nSe observó inconsistencia en el uso de film plástico sobre materias primas: algunas MP se encontraban cubiertas y otras no, sin criterio documentado. En el caso de MP de Perfungol, todas estaban cubiertas.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-462", "tipo": "CAPA", "estado": "Abierto", "area": "Bodega", "responsable": "Pablo Garrido/Supervisor de Bodega", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Fuera de plazo", "accion": "Actualización de SOP BB-055: despacho, limpieza, pesaje y uso de materias primas", "descripcion": "19._Falta de segregación clara entre MP palletizadas de diferentes productos\nEn la sala de pesaje, las materias primas palletizadas para distintos productos no presentan\nseparación física o demarcación visual que las identifique claramente a que producto pertenecen", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-463", "tipo": "CAPA", "estado": "Abierto", "area": "Producción - I", "responsable": "Oswaldo Tamayo/Jefe de Turno PI", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Con fecha", "accion": "Ejecutar el recambio de lamas y establecer el recambio de las lamas de forma anual y/o cuando se considere necesario (cortadas, rotas, manchadas), en infraestructura planta de producción.", "descripcion": "20._Lamas y piso deteriorado en zona de lavado\nLa zona de lavado presenta lamas rotas, con marchas oscuras en su base y piso con daños\nestructurales.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-464", "tipo": "CAPA", "estado": "Abierto", "area": "Mantenimiento", "responsable": "Rubén Montenegro/Jefe de Mantenimiento", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Con fecha", "accion": "Ejecutar el recambio del piso actual a piso que cumpla condiciones sanitarias, en infraestructura planta de producción.", "descripcion": "20._Lamas y piso deteriorado en zona de lavado\nLa zona de lavado presenta lamas rotas, con marchas oscuras en su base y piso con daños\nestructurales.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-465", "tipo": "CAPA", "estado": "Abierto", "area": "Producción - I", "responsable": "Oswaldo Tamayo/Jefe de Turno PI", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Con fecha", "accion": "Evaluar el cambio de los implementos de limpieza (mopa tipo chascón) a implementos de limpieza (mopa de microfibra), planta de producción.", "descripcion": "21._Uso de mopas tipo “chascón”, no aptas para uso GMP\nEl utensilio utilizado para lavado de pisos corresponde a una mopa de fibras gruesas, sin factibilidad de lavado y con secado al aire.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-466", "tipo": "CAPA", "estado": "Abierto", "area": "Producción - I", "responsable": "Oswaldo Tamayo/Jefe de Turno PI", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Con fecha", "accion": "Actualización de SOP PI-013 \"Procedimiento de uso de la etiqueta limpio/sucio en el estado y uso de los equipos y áreas\", indicando cuándo se debe verificar la condiciones de limpieza de los equipos y accesorios.", "descripcion": "22._Etiquetas de estado de limpieza sin verificación\nSe observaron etiquetas que indican el estado de limpieza, sin evidencia de firma, fecha u otro tipo de verificación.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-467", "tipo": "CAPA", "estado": "Abierto", "area": "Producción - I", "responsable": "Oswaldo Tamayo/Jefe de Turno PI", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Con fecha", "accion": "Creación de procedimiento de limpieza y almacenamiento de utensilios y accesorios empleados en los procesos de fabricación", "descripcion": "23._Insumos limpios almacenados sin protección en zona de lavadero\nInsumos limpios, incluyendo utensilios de uso posterior en producción, se encontraban almacenados dentro del lavadero sin protección contra salpicaduras, humedad o contaminación cruzada.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-468", "tipo": "CAPA", "estado": "Abierto", "area": "Validaciones", "responsable": "Davis Martínez/Encargado de Proyectos y Sistemas de Apoyo Crítico.", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Con fecha", "accion": "Actualización de SOP LEM-002 \"Procedimiento de \"preparación de detergentes y sanitizantes\", incorporando las instrucciones de dónde almacenar las soluciones preparadas y como ejecutar su rotulación.", "descripcion": "24._Jabón y botellas sin rotulación adecuada\nEnvases de jabón y botellas conteniendo soluciones de limpieza no cuentan con identificación clara, fecha de preparación o vencimiento.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-470", "tipo": "CAPA", "estado": "Abierto", "area": "Validaciones", "responsable": "Davis Martínez/Encargado de Proyectos y Sistemas de Apoyo Crítico.", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Con fecha", "accion": "Revalidación de sistema de agua purificada, próximo año se tendrá operativa una nueva planta de agua que incluye TOC en línea", "descripcion": "25._Manejo de sistema de agua purificada y TOC\nSe revisa el punto de agua purificada N°11, se pregunta a auditado por control de TOC, e indica que es por medio de análisis de toma de muestras diarias, sin contar con un medidor de TOC en línea. Se solicitan procedimientos escritos que describa el man", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-471", "tipo": "CAPA", "estado": "Abierto", "area": "Producción - I", "responsable": "Oswaldo Tamayo/Jefe de Turno PI", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Con fecha", "accion": "Ejecutar el reemplazo de todos los basureros que se encuentren en mal estado en área de producción.\n *Establecer cuales son las condiciones que deben tener los basureros para permanecer en la planta productiva y en caso de ser necesario establecer la frecuencia de recambio de estos.", "descripcion": "26._Basurero del lavadero roto\nEl basurero del lavadero presenta daños visibles, dificultando la contención adecuada de residuos.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-473", "tipo": "CAPA", "estado": "Abierto", "area": "Validaciones", "responsable": "Davis Martínez/Encargado de Proyectos y Sistemas de Apoyo Crítico.", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Fuera de plazo", "accion": "Reporte: VAL-141-473\nProcedimiento\nde Validación de Limpieza\n Equipo:  Tambor de 200L 03L, 05L, 06L.", "descripcion": "28._Limpieza del mezclador con agua purificada desde contenedor sin validación\nPara la limpieza del mezclador se utiliza agua purificada transportada en un contenedor móvil, sin validación del método ni verificación del riesgo de contaminación durante el traslado", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-474", "tipo": "CAPA", "estado": "Abierto", "area": "Control de Calidad", "responsable": "Christian Espinoza/Jefe de Control de Calidad", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Con fecha", "accion": "Reporte del estudio a realizar in vitro a los sanitizantes (protocolo, pruebas y reporte)", "descripcion": "29._Ausencia de estudio de rotación de sanitizantes\nEl auditado indicó que cuentan con sanitizantes rotativos, pero al solicitar respaldos no existe un estudio de rotación que permita prevenir resistencia microbiológica.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-475", "tipo": "CAPA", "estado": "Abierto", "area": "Producción", "responsable": "Cristian Moreno/Jefe Producción", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Sin fecha", "accion": "La producción de Perfungol está programada en base a la etapa limitante (más lenta) que corresponde al llenado. Esto implica que la sala y el equipo mezclador no necesitan estar en operación el 100% del tiempo, por lo que la ausencia temporal del operador  (vacaciones, permisos, licencias) no es un issue relevante o de impacto si corresponde a una corta temporalidad. Para ausencias prolongadas, existen operadores de mezclado que pueden reemplazar al que trabaja habitualmente en ese proceso. En base a lo anterior, no consideramos este punto como una no conformidad, sino una observación que no fue aclarada durante el proceso de auditoría.", "descripcion": "30._Sin producción por operador dedicado ausente\nSe informó que la fabricación de Perfungol no pudo ser observada debido a la ausencia del único operador capacitado (licencia médica). No se cuenta con suplencia de operario.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-476", "tipo": "CAPA", "estado": "Abierto", "area": "Mantenimiento", "responsable": "Rubén Montenegro/Jefe de Mantenimiento", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Con fecha", "accion": "Realizar pulido de piso y recubrimiento epóxico transparente; infraesructura planta de producción.", "descripcion": "31._Piso de sala de fabricación de Perfungol en mal estado\nEl piso de la sala de fabricación de Perfungol presenta desgaste severo, grietas y desprendimiento de cemento. Esto compromete la limpieza y genera riesgo de contaminación por partículas desprendidas durante la operación.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-477", "tipo": "CAPA", "estado": "Abierto", "area": "Producción - I", "responsable": "Oswaldo Tamayo/Jefe de Turno PI", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Con fecha", "accion": "Evaluar la instalación de una carcasa protectora en el equipo molino fitzpatrick que impida el desprendimiento de particulado desde la zona de engranajes y correa transmisora y/o cualquier otra sugerencia que sea acorde a la realidad del proceso productivo.", "descripcion": "32._Molino Fitzpatrick con engranajes y correa expuesta\nEl molino Fitzpatrick presenta zona de engranajes y correa transmisora expuestas, sin protección o barrera de contención para limpieza de equipo", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-478", "tipo": "CAPA", "estado": "Abierto", "area": "Producción - I", "responsable": "Oswaldo Tamayo/Jefe de Turno PI", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Fuera de plazo", "accion": "Capacitar al personal en las instrucciones indicadas en el SOP QA-013 \"Lineamientos generales de Buenas Prácticas en Planta de Instituto Bioquímico BETA S.A.\"", "descripcion": "33._Técnico de mantenimiento circula con ropa de producto expuesto en área común\nSe observó a un técnico de mantenimiento externo saliendo del área de envasado primario con vestimenta expuesta a producto en polvo, hacia zonas comunes", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-479", "tipo": "CAPA", "estado": "Abierto", "area": "Producción - I", "responsable": "Oswaldo Tamayo/Jefe de Turno PI", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Con fecha", "accion": "Ejecutar el reemplazo de todos los basureros que se encuentren en mal estado.\n*Establecer cuáles son las condiciones que deben tener los basureros para permanecer en la planta productiva y en caso de ser necesario establecer la frecuencia de recambio de éstos.", "descripcion": "34._Uso de basurero improvisado\nEl contenedor de residuos consiste en una bolsa colgada en una puerta, sin estructura rígida, tapa ni controles de limpieza.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-480", "tipo": "CAPA", "estado": "Abierto", "area": "Producción - I", "responsable": "Oswaldo Tamayo/Jefe de Turno PI", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Fuera de plazo", "accion": "Capacitar al personal en las instrucciones indicadas en el SOP QA-013 \"Lineamientos generales de Buenas Prácticas en Planta de Instituto Bioquímico BETA S.A.\"", "descripcion": "35._Operario limpia paleta con su ropa\nSe observó a un operario limpiando una paleta de agitación de producto directamente en su vestimenta.", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-481", "tipo": "CAPA", "estado": "Abierto", "area": "Producción - I", "responsable": "Oswaldo Tamayo/Jefe de Turno PI", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "Crítico", "compromiso": "Con fecha", "accion": "Evaluar las estrategias de limpieza más adecuadas para ejecutar el lavado de bandejas y en caso de ser necesario realizar el recambio de las bandejas de almacenamiento del área de envasado", "descripcion": "36._Dos operarios sin mascarilla de filtro requerida para polvo\nEn el área de envasado primario se observaron dos operadores sin mascarillas de protección con filtro, pese a que las características del producto (polvo fino) requieren protección adecuada tanto para evitar exposición del trabajador co", "es_emision_pendiente": false}, {"id": "Bago 2025-004", "id_registro": "CAPA-25-482", "tipo": "CAPA", "estado": "Abierto", "area": "Producción - I", "responsable": "Oswaldo Tamayo/Jefe de Turno PI", "fecha_apertura": "2026-04-07", "dias": 84, "criticidad": "C async function simpleHash(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');

  document.body.insertBefore(bar, document.body.firstChild);
}

function refreshLockBar(bar){
  bar = bar || document.getElementById('lock-bar');
  if (!bar) return;
  if (LOCK.unlocked){
    bar.innerHTML = `<span class="lock-status unlocked">✓ Edición desbloqueada en este navegador</span><button class="lock-btn" id="lock-btn-relock">Bloquear de nuevo</button>`;
    bar.querySelector('#lock-btn-relock').addEventListener('click', () => {
      LOCK.lock();
      refreshLockBar(bar);
      rerenderAll();
    });
  } else {
    bar.innerHTML = `<span class="lock-status">Vista de solo lectura — el seguimiento personal está bloqueado</span><button class="lock-btn" id="lock-btn-unlock">Desbloquear edición</button>`;
    bar.querySelector('#lock-btn-unlock').addEventListener('click', async () => {
      const pin = prompt('Ingresa el PIN para habilitar tu seguimiento personal:');
      if (pin == null) return;
      const ok = await LOCK.tryUnlock(pin);
      if (ok){
        refreshLockBar(bar);
        rerenderAll();
      } else {
        alert('PIN incorrecto.');
      }
    });
  }
}

function rerenderAll(){
  // Re-render the active view so widgets pick up the new lock state, without losing the tab in focus
  const activeBtn = document.querySelector('.tab-btn.active');
  boot(activeBtn ? activeBtn.dataset.tab : 'resumen');
}

// ---------- Personal tracking (localStorage, per-browser, never touches source data) ----------
const TRACK_KEY = 'calidad_seguimiento_personal_v1';

const TRACK = {
  _data: null,
  load(){
    if (this._data) return this._data;
    try {
      this._data = JSON.parse(localStorage.getItem(TRACK_KEY) || '{}');
    } catch(e) {
      this._data = {};
    }
    return this._data;
  },
  save(){
    try { localStorage.setItem(TRACK_KEY, JSON.stringify(this._data)); }
    catch(e) { /* storage unavailable — fails silently, nothing else depends on it */ }
  },
  get(id){
    const d = this.load();
    return d[id] || {done:false, note:''};
  },
  setDone(id, done){
    const d = this.load();
    d[id] = d[id] || {done:false, note:''};
    d[id].done = done;
    this.save();
  },
  setNote(id, note){
    const d = this.load();
    d[id] = d[id] || {done:false, note:''};
    d[id].note = note;
    this.save();
  },
  countDone(ids){
    const d = this.load();
    return ids.filter(id => d[id] && d[id].done).length;
  }
};

// Reusable tracker widget: checkbox + short note input, scoped to one event id
function trackWidget(id){
  const t = TRACK.get(id);
  const checked = t.done ? 'checked' : '';
  const doneClass = t.done ? 'is-done' : '';
  const disabled = LOCK.unlocked ? '' : 'disabled';
  const lockedClass = LOCK.unlocked ? '' : 'is-locked';
  return `
    <div class="track-widget ${doneClass} ${lockedClass}" data-track-id="${esc(id)}">
      <label class="track-check">
        <input type="checkbox" class="track-checkbox" ${checked} ${disabled}>
        <span>Avancé en esto</span>
      </label>
      <input type="text" class="track-note" placeholder="${LOCK.unlocked ? 'Nota personal (ej. evidencia enviada, hablé con...)' : 'Bloqueado — solo tú puedes editar'}" value="${esc(t.note)}" ${disabled}>
    </div>`;
}

function bindTrackWidgets(scopeEl){
  if (!LOCK.unlocked) return; // read-only: nothing to bind
  scopeEl.querySelectorAll('[data-track-id]').forEach(widget => {
    const id = widget.dataset.trackId;
    const checkbox = widget.querySelector('.track-checkbox');
    const note = widget.querySelector('.track-note');
    checkbox.addEventListener('change', () => {
      TRACK.setDone(id, checkbox.checked);
      widget.classList.toggle('is-done', checkbox.checked);
      updateTrackCounters();
    });
    note.addEventListener('input', () => {
      TRACK.setNote(id, note.value);
    });
  });
}

function updateTrackCounters(){
  document.querySelectorAll('[data-track-counter]').forEach(el => {
    const ids = JSON.parse(el.dataset.trackCounter);
    el.textContent = `${TRACK.countDone(ids)} de ${ids.length} marcados como avanzados (solo visible para ti)`;
  });
}

  return `
    <div class="section-head"><h2>Cruce con documentación regulatoria</h2></div>
    <p class="section-sub">Se buscaron códigos de documento (SOP, VAL, MAN, etc.) mencionados en el texto de los CAPA abiertos y se compararon contra el Panel de Control de Elementos Regulatorios, para detectar si la actualización ya ocurrió. El ID destacado es el evento de origen; el código menor es el registro CAPA real. <strong>Nota:</strong> un mismo CAPA puede mencionar más de un documento, por lo que aparece en más de una tarjeta — el número de tarjetas no siempre coincide con el número de CAPA distintos.</p>
    <p class="track-counter" data-track-counter='${JSON.stringify(DATA.cruce_regulatorio.map(c=>`cruce-${c.capa_id_registro}-${c.doc_codigo}`))}'></p>

    <h3 id="cruce-evidencia" style="font-family:var(--cond);font-size:16px;margin:22px 0 10px;">Con evidencia objetiva de cierre (${valid.length} tarjetas · ${validCapaCount} CAPA distintos)</h3>
    ${valid.length ? valid.map(card).join('') : '<div class="empty-state">Ninguno por ahora.</div>'}

    <h3 style="font-family:var(--cond);font-size:16px;margin:26px 0 10px;">Requieren revisión manual (${review.length} tarjetas · ${reviewCapaCount} CAPA distintos)</h3>
    ${review.map(card).join('')}
  `;
}

// ---------- View: Todos los eventos (filterable table) ----------
function renderTodos(){
  const tipos = [...new Set(DATA.eventos.map(e=>e.tipo))].sort();
  const estados = [...new Set(DATA.eventos.map(e=>e.estado))].sort();
  const areas = [...new Set(DATA.eventos.map(e=>e.area))].sort();

  return `
    <div class="section-head"><h2>Todos los eventos abiertos</h2></div>
    <p class="section-sub">Tabla completa filtrable de los ${DATA.eventos.length} eventos abiertos. Úsala para buscar por responsable, área o palabra clave en la acción.</p>
    <div class="filter-bar">
      <select id="f-tipo"><option value="">Todos los tipos</option>${tipos.map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join('')}</select>
      <select id="f-estado"><option value="">Todos los estados</option>${estados.map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join('')}</select>
      <select id="f-area"><option value="">Todas las áreas</option>${areas.map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join('')}</select>
      <input type="text" id="f-search" placeholder="Buscar responsable, ID o acción...">
      <button class="clear-btn" id="f-clear">Limpiar filtros</button>
      <span class="result-count" id="f-count"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Tipo</th><th>Estado</th><th>Área</th><th>Responsable</th><th>Acción</th><th>Apertura</th><th>Días</th><th>Tu seguimiento</th></tr></thead>
        <tbody id="todos-tbody"></tbody>
      </table>
    </div>
  `;
}

function bindTodosFilters(){
  const tipoSel = document.getElementById('f-tipo');
  const estadoSel = document.getElementById('f-estado');
  const areaSel = document.getElementById('f-area');
  const search = document.getElementById('f-search');
  const clearBtn = document.getElementById('f-clear');
  const tbody = document.getElementById('todos-tbody');
  const countEl = document.getElementById('f-count');

  function apply(){
    const tipo = tipoSel.value, estado = estadoSel.value, area = areaSel.value;
    const q = search.value.trim().toLowerCase();
    const filtered = DATA.eventos.filter(e => {
      if (tipo && e.tipo !== tipo) return false;
      if (estado && e.estado !== estado) return false;
      if (area && e.area !== area) return false;
      if (q){
        const hay = `${e.id} ${e.id_registro||''} ${e.responsable} ${e.accion} ${e.descripcion}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
    countEl.textContent = `${filtered.length} de ${DATA.eventos.length}`;
    tbody.innerHTML = filtered.slice(0,400).map(e => `
      <tr>
        <td><span class="urgency-bar" style="background:${urgencyColor(e.dias)}"></span>${idCellHtml(e)}</td>
        <td>${tipoPill(e.tipo)}</td>
        <td>${e.compromiso==='Fuera de plazo' ? '<span class="pill pill-fueraplazo">Fuera de plazo</span>' : esc(e.estado)}</td>
        <td>${esc(e.area)}</td>
        <td style="font-size:12px;">${esc(e.responsable)}</td>
        <td class="action-cell">${e.es_emision_pendiente ? '<span class="pill pill-emision">Por emitir</span> ' : ''}${esc(e.accion) || '—'}</td>
        <td>${fmtDate(e.fecha_apertura)}</td>
        <td class="days-cell" style="color:${urgencyColor(e.dias)};font-weight:600;">${e.dias ?? '—'}</td>
        <td>${trackWidget(e.id_registro || e.id)}</td>
      </tr>`).join('');
    if (filtered.length > 400){
      tbody.innerHTML += `<tr><td colspan="9" style="text-align:center;color:var(--ink-soft);font-family:var(--mono);font-size:11px;padding:14px;">Mostrando 400 de ${filtered.length} resultados — refina la búsqueda para ver más</td></tr>`;
    }
    bindTrackWidgets(tbody);
  }

  [tipoSel, estadoSel, areaSel].forEach(el => el.addEventListener('change', apply));
  search.addEventListener('input', apply);
  clearBtn.addEventListener('click', () => {
    tipoSel.value = ''; estadoSel.value = ''; areaSel.value = ''; search.value = '';
    apply();
  });
  apply();
}

// ---------- View: Otros estados (excluded from main count, shown for transparency) ----------
function renderOtros(){
  if (DATA.total_otros_estados === 0){
    return `<div class="section-head"><h2>Otros estados</h2></div><div class="empty-state">No hay eventos en estados especiales.</div>`;
  }
  const resumenRows = DATA.resumen_otros_estados.map(r => `
    <div class="bar-row">
      <span class="label">${esc(r.estado)}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${(r.cantidad/DATA.total_otros_estados*100).toFixed(0)}%"></div></div>
      <span class="val">${r.cantidad}</span>
    </div>`).join('');

  const rows = DATA.otros_estados.map(e => `
    <tr>
      <td>${idCellHtml(e)}</td>
      <td>${tipoPill(e.tipo)}</td>
      <td><span class="pill pill-aviso">${esc(e.estado)}</span></td>
      <td>${esc(e.area)}</td>
      <td style="font-size:12px;">${esc(e.responsable)}</td>
      <td class="action-cell">${esc(e.accion) || '—'}</td>
      <td>${fmtDate(e.fecha_apertura)}</td>
      <td>${fmtDate(e.fecha_cierre)}</td>
    </tr>`).join('');

  return `
    <div class="section-head"><h2>Otros estados</h2></div>
    <p class="section-sub">Estos ${DATA.total_otros_estados} eventos no están en "Abierto" ni "En Seguimiento", pero tampoco están marcados "Cerrado" — quedaron en estados especiales del Excel (Nulo, Cierre Condicionado, RESUELTO/AB_RAP). Por eso <strong>no se incluyen</strong> en el conteo principal de trabajo pendiente, pero se muestran aquí para que no se pierdan de vista. Muchos registros "Nulo" parecen ser datos de captura inconsistente — vale la pena revisarlos directamente en el Excel.</p>
    <div class="card" style="margin-bottom:18px;max-width:420px;">
      <h3>Distribución por estado</h3>
      ${resumenRows}
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Tipo</th><th>Estado</th><th>Área</th><th>Responsable</th><th>Acción</th><th>Apertura</th><th>Cierre</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

// ---------- Boot ----------
function boot(activeTab){
  activeTab = activeTab || 'resumen';
  renderHeader();
  renderTabs(activeTab);

  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="view" id="view-resumen">${renderResumen()}</div>
    <div class="view" id="view-emisiones">${renderEmisiones()}</div>
    <div class="view" id="view-plazo">${renderPlazo()}</div>
    <div class="view" id="view-duplicados">${renderDuplicados()}</div>
    <div class="view" id="view-sop">${renderSop()}</div>
    <div class="view" id="view-cruce">${renderCruce()}</div>
    <div class="view" id="view-todos">${renderTodos()}</div>
    <div class="view" id="view-otros">${renderOtros()}</div>
  `;
  const target = document.getElementById('view-'+activeTab);
  if (target) target.classList.add('active');

  bindTodosFilters();
  bindTrackWidgets(main);
  updateTrackCounters();

  if (!document.getElementById('lock-bar')){
    renderLockBar();
  } else {
    refreshLockBar();
  }
}

boot();
</script>
